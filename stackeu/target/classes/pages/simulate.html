<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STACK•EU - Simulation</title>
    
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/simulate.css"> 
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="../scripts/simulate.js"></script>
</head>
<body>
    
    <main class="page-wrapper simulate-page" id="export-target">
        
        <header>
            <img src="../assets/logo.png" alt="StackEU Logo">
            <p class="section-label">Reference String</p>
            <h1 class="reference-string">Loading...</h1>
        </header>

       <div class="action-buttons">
            <a class="btn-action primary small-btn" style="cursor: pointer;" onclick="if(window.javaApp){javaApp.navigate('start'); return false;} else {window.location.href='start.html';}">Restart</a>
            
            <button id="exportImgBtn" class="btn-action export small-btn" style="cursor: pointer;">Save IMG</button>
            <button id="exportPdfBtn" class="btn-action export small-btn" style="cursor: pointer; background-color: #c0392b;">Save PDF</button>
            
            <a href="../index.html" class="btn-action secondary small-btn" onclick="if(window.javaApp){javaApp.navigate('home'); return false;}">Main Menu</a>
        </div>

        <div id="exportLoadingOverlay" class="loading-overlay hidden">
            <div class="loading-modal">
                <div class="spinner"></div>
                <h3 id="loadingTitle">Processing Export...</h3>
                <p>Please wait while we generate your file.</p>
            </div>
        </div>
        
    </main>

</body>
</html>
